name: Tesla Inventory Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

concurrency:
  group: tesla-inventory-tracker
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --requirement requirements.txt

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TESLA_MODEL: "my"
          TESLA_MIN_YEAR: "2024"
          TESLA_MAX_PRICE: "28000"
          TESLA_TRIM_KEYWORDS: "rear-wheel drive,rwd"
        run: python tracker.py

      - name: Commit updated inventory state
        if: success()
        run: |
          if git diff --quiet -- inventory_state.json; then
            echo "No inventory state changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add inventory_state.json
          git commit -m "Update Tesla inventory state"
          git push